name: Terraform Plan + OPA Policy Gate

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - "policy/**"
      - "src/lambda/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "policy/**"
      - "src/lambda/**"
      - ".github/workflows/terraform.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan-and-policy-check:
    name: Plan + Policy Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Setup Conftest
        run: |
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz
          tar xzf conftest_0.56.0_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.55.1

      - name: TFLint
        run: |
          tflint --init
          tflint --recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_recipient_email: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          terraform plan -out=tfplan -no-color -input=false
          terraform show -json tfplan > tfplan.json

      - name: OPA / Conftest Policy Gate
        run: conftest test --policy ../policy --all-namespaces tfplan.json

      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            terraform/tfplan
            terraform/tfplan.json
          retention-days: 30

      - name: Apply (only on push to main, after gate passes)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply tfplan
